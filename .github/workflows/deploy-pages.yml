# Lint and build on PRs; on push to main, also deploy static site to GitHub Pages.
# Repo settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Set Vite base URL for GitHub Pages
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            NAME="${{ github.event.repository.name }}"
            OWNER="${{ github.repository_owner }}"
            if [ "$NAME" = "${OWNER}.github.io" ]; then
              echo "VITE_BASE_URL=/" >> "$GITHUB_ENV"
            else
              echo "VITE_BASE_URL=/${NAME}/" >> "$GITHUB_ENV"
            fi
          else
            echo "VITE_BASE_URL=/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build
        env:
          VITE_SITE_ACCESS_HASH: ${{ secrets.VITE_SITE_ACCESS_HASH }}
          VITE_SITE_ACCESS_QUESTION: ${{ secrets.VITE_SITE_ACCESS_QUESTION }}

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
