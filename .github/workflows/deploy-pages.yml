# Lint on PRs and pushes; on push to main, build with GitHub Pages env secrets then deploy.
# Repo settings → Pages → Build and deployment → Source: GitHub Actions.
#
# VITE_SITE_ACCESS_* must reach the production Vite build. Repository Actions secrets are
# available to every job. Secrets stored only under Environments → github-pages are injected
# only into jobs that declare `environment: github-pages` (the `pages` job below).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Build (compile check, no gate secrets)
        if: github.event_name == 'pull_request'
        run: npm run build

  pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Set Vite base URL for GitHub Pages
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "${OWNER}.github.io" ]; then
            echo "VITE_BASE_URL=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_URL=/${NAME}/" >> "$GITHUB_ENV"
          fi

      - name: Verify site gate hash present
        env:
          VITE_SITE_ACCESS_HASH: ${{ secrets.VITE_SITE_ACCESS_HASH }}
        run: |
          n=${#VITE_SITE_ACCESS_HASH}
          if [ "$n" -ne 64 ]; then
            echo "::error::VITE_SITE_ACCESS_HASH must be a 64-character SHA-256 hex string (length was $n)."
            echo "Add it under Settings → Environments → github-pages → Environment secrets, or under Actions repository secrets."
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          VITE_SITE_ACCESS_HASH: ${{ secrets.VITE_SITE_ACCESS_HASH }}
          VITE_SITE_ACCESS_QUESTION: ${{ secrets.VITE_SITE_ACCESS_QUESTION }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
